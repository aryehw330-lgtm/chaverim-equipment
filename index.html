<body>
<div class="header"><div class="header-logo">C</div><div><div class="header-title">Chaverim Equipment</div><div class="header-sub">Bergen County COBC</div></div><div class="header-right"><button class="refresh-btn" onclick="refreshAll()">&#8635; Refresh</button></div></div>
<div class="tabs"><button class="tab active" onclick="switchTab('dashboard',this)">Dashboard</button><button class="tab" onclick="switchTab('checkinout',this)">Check In/Out</button><button class="tab" onclick="switchTab('inventory',this)">Inventory</button><button class="tab" onclick="switchTab('admin',this)">Admin</button></div>
<div class="page active" id="page-dashboard">
<div class="stats-row"><div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-label">Total Items</div></div><div class="stat-card"><div class="stat-num" id="stat-out" style="color:#e67e22">-</div><div class="stat-label">Checked Out</div></div><div class="stat-card"><div class="stat-num" id="stat-in" style="color:#27ae60">-</div><div class="stat-label">Available</div></div></div>
<div class="card"><div class="card-header">Currently Out</div><div class="card-body" id="dash-out-list"><div class="loading"><div class="spinner"></div><br>Loading...</div></div></div>
<div class="card"><div class="card-header">CNC Items (Wrong Location)</div><div class="card-body" id="dash-cnc-list"><div class="loading"><div class="spinner"></div><br>Loading...</div></div></div>
<div class="card"><div class="card-header">Recent Activity</div><div class="card-body" id="dash-activity"><div class="loading"><div class="spinner"></div><br>Loading...</div></div></div>
<div class="card"><div class="card-header">&#128101; Member Information</div><div class="card-body"><input type="text" class="member-search" id="member-search" placeholder="&#128269; Search members..." oninput="filterMembers()"><div id="dash-members"><div class="loading"><div class="spinner"></div><br>Loading members...</div></div></div></div>
</div>
<div class="page" id="page-checkinout"><div class="card"><div class="card-header">Check In / Check Out</div><div class="card-body">
<div class="checkin-type-row"><button class="type-btn" id="btn-checkout" onclick="selectType('OUT')">Check OUT</button><button class="type-btn" id="btn-checkin" onclick="selectType('IN')">Check IN</button></div>
<div class="form-group"><label>Item</label><select id="form-item"><option value="">- Select item -</option></select></div>
<div class="form-group"><label>Member # (BC-___)</label><input type="text" id="form-member" placeholder="e.g. 54" maxlength="6"></div>
<div class="form-group"><label>Dispatched Call Number</label><input type="text" id="form-call" placeholder="See call number in WhatsApp chat"></div>
<div class="form-group" id="cc-cnc-group" style="display:none"><label>Status (CC / CNC)</label><select id="form-cc-cnc" onchange="toggleCncNote()"><option value="CC">CC - Returned to correct location</option><option value="CNC">CNC - Item in wrong location (be specific)</option></select></div>
<div class="form-group" id="cnc-note-group" style="display:none"><label>CNC Details - Item is at:</label><textarea id="form-cnc-note" placeholder="e.g. Fan 3 left at 123 Main St"></textarea></div>
<button class="btn btn-green" onclick="submitCheckInOut()">Submit</button>
</div></div></div>
<div class="page" id="page-inventory">
<div class="search-wrap"><span class="search-icon">&#128269;</span><input type="text" id="search-input" placeholder="Search equipment..." oninput="filterInv()"></div>
<div class="filter-pills"><button class="pill active" onclick="setFilter('all',this)">All</button><button class="pill" onclick="setFilter('IN',this)">In</button><button class="pill" onclick="setFilter('OUT',this)">Out</button><button class="pill" onclick="setFilter('CNC',this)">CNC</button></div>
<div class="card"><div class="card-body" id="inventory-list"><div class="loading"><div class="spinner"></div><br>Loading...</div></div></div>
</div>
<div class="page" id="page-admin">
<div id="admin-lock"><div class="lock-screen"><div class="lock-icon">&#128274;</div><div class="lock-title">Admin Access</div><div class="lock-sub">Enter the 4-digit admin code</div><div class="lock-input-wrap"><input type="password" id="admin-pin" maxlength="4" placeholder="****" oninput="checkPin()" inputmode="numeric"></div><div class="lock-error" id="pin-error"></div></div></div>
<div id="admin-content" style="display:none">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:13px;color:var(--dark-gray)">&#128275; Admin unlocked</div><button onclick="lockAdmin()" style="background:none;border:1px solid #ddd;padding:5px 12px;border-radius:8px;font-size:12px;cursor:pointer">Lock</button></div>
<div class="card"><div class="card-header">+ Add New Equipment Item</div><div class="card-body"><div class="form-group"><label>Item Name</label><input type="text" id="new-item-name" placeholder="e.g. Air Compressor #3"></div><div class="form-group"><label>Default Location</label><input type="text" id="new-item-location" placeholder="e.g. Teaneck Garage"></div><button class="btn btn-gold" onclick="addNewItem()">Add Item to Sheet</button></div></div>
<div class="card"><div class="card-header">&#128205; Edit Item Locations</div><div class="card-body" id="location-editor"><div class="loading"><div class="spinner"></div><br>Loading...</div></div></div>
<div class="card"><div class="card-header">&#128101; Manage Members</div><div class="card-body">
<div class="section-note">Add or remove members from the Chaverim Member Info sheet.</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px"><input type="text" id="nm-unit" placeholder="Unit # (BC-99)"><input type="text" id="nm-first" placeholder="First Name"></div>
