<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="COBC Equipment">
<meta name="theme-color" content="#1a3a2a">
<title>Chaverim Equipment Manager</title>
<style>
:root{--green:#1a3a2a;--green-light:#3a8a58;--gold:#c9a84c;--dark-gray:#888;--red:#c0392b;--card-bg:#fff;--shadow:0 2px 12px rgba(0,0,0,.12)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#f0ede6;color:#222;min-height:100vh;padding-bottom:80px}
.header{background:var(--green);color:#fff;padding:14px 16px 12px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-logo{width:38px;height:38px;background:var(--gold);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--green);flex-shrink:0}
.header-title{font-size:17px;font-weight:700;line-height:1.2}
.header-sub{font-size:11px;opacity:.7}
.header-right{margin-left:auto}
.refresh-btn{background:rgba(255,255,255,.15);border:none;color:#fff;padding:7px 12px;border-radius:8px;font-size:13px;cursor:pointer}
.tabs{display:flex;background:var(--green);padding:0 8px 8px;gap:6px}
.tab{flex:1;padding:8px 4px;background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.7);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.tab.active{background:var(--gold);color:var(--green)}
.page{display:none;padding:12px}
.page.active{display:block}
.card{background:var(--card-bg);border-radius:14px;box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.card-header{background:var(--green);color:#fff;padding:12px 16px;font-size:14px;font-weight:700}
.card-body{padding:14px 16px}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px}
.badge-in{background:#d4edda;color:#155724}
.badge-out{background:#ffeeba;color:#856404}
.badge-cc{background:#cce5ff;color:#004085}
.badge-cnc{background:#f8d7da;color:#721c24}
.equip-item{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid #f0ede6;gap:10px}
.equip-item:last-child{border-bottom:none}
.equip-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot-in{background:#27ae60}
.dot-out{background:#e67e22}
.equip-name{font-size:14px;font-weight:600;flex:1}
.equip-location{font-size:11px;color:var(--dark-gray);margin-top:2px}
.form-group{margin-bottom:14px}
label{display:block;font-size:13px;font-weight:600;color:#444;margin-bottom:5px}
select,input[type=text],textarea{width:100%;padding:11px 13px;border:1.5px solid #ddd;border-radius:10px;font-size:15px;background:#fff;-webkit-appearance:none;appearance:none;color:#222}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--green-light)}
textarea{resize:vertical;min-height:70px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s}
.btn:active{opacity:.8}
.btn-green{background:var(--green);color:#fff}
.btn-gold{background:var(--gold);color:var(--green)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.stat-card{background:var(--card-bg);border-radius:12px;padding:12px 8px;text-align:center;box-shadow:var(--shadow)}
.stat-num{font-size:26px;font-weight:800;color:var(--green)}
.stat-label{font-size:10px;color:var(--dark-gray);font-weight:600;margin-top:2px}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{padding-left:36px;border-radius:12px;background:#fff;border:1.5px solid #ddd}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--dark-gray)}
.loading{text-align:center;padding:40px 20px;color:var(--dark-gray);font-size:14px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #ddd;border-top-color:var(--green-light);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.filter-pills{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid #ddd;background:#fff;cursor:pointer;transition:all .15s}
.pill.active{background:var(--green);color:#fff;border-color:var(--green)}
.checkin-type-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.type-btn{padding:12px;border-radius:10px;border:2px solid #ddd;background:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
.type-btn.selected-out{border-color:#e67e22;background:#fff3e0;color:#e67e22}
.type-btn.selected-in{border-color:#27ae60;background:#e8f5e9;color:#27ae60}
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">C</div>
  <div><div class="header-title">Chaverim Equipment</div><div class="header-sub">Bergen County COBC</div></div>
  <div class="header-right"><button class="refresh-btn" onclick="refreshAll()">&#8635; Refresh</button></div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('dashboard',this)">Dashboard</button>
  <button class="tab" onclick="switchTab('checkinout',this)">Check In/Out</button>
  <button class="tab" onclick="switchTab('inventory',this)">Inventory</button>
  <button class="tab" onclick="switchTab('admin',this)">Admin</button>
</div>
<div class="page active" id="page-dashboard">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-total">-</div><div class="stat-label">Total Items</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-out" style="color:#e67e22">-</div><div class="stat-label">Checked Out</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-in" style="color:#27ae60">-</div><div class="stat-label">Available</div></div>
  </div>
  <div class="card"><div class="card-header">Currently Out</div><div class="card-body" id="dash-out-list"><div class="loading"><div class="spinner"></div><br>Loading...</div></div></div>
  <div class="card"><div class="card-header">CNC Items (Wrong Location)</div><div class="card-body" id="dash-cnc-list"><div class="loading"><div class="spinner"></div><br>Loading...</div></div></div>
</div>
<div class="page" id="page-checkinout">
  <div class="card"><div class="card-header">Check In / Check Out</div><div class="card-body">
    <div class="checkin-type-row">
      <button class="type-btn" id="btn-checkout" onclick="selectType('OUT')">Check OUT</button>
      <button class="type-btn" id="btn-checkin" onclick="selectType('IN')">Check IN</button>
    </div>
    <div class="form-group"><label>Item</label><select id="form-item"><option value="">- Select item -</option></select></div>
    <div class="form-group"><label>Member # (BC-___)</label><input type="text" id="form-member" placeholder="e.g. 123" maxlength="6"></div>
    <div class="form-group"><label>Call # (optional)</label><input type="text" id="form-call" placeholder="e.g. 4521"></div>
    <div class="form-group" id="location-group"><label>Location</label><input type="text" id="form-location" placeholder="Where is it going?"></div>
    <div class="form-group" id="cc-cnc-group" style="display:none"><label>Status</label><select id="form-cc-cnc"><option value="CC">CC - Returned to correct location</option><option value="CNC">CNC - Item in wrong location</option></select></div>
    <div class="form-group" id="cnc-note-group" style="display:none"><label>CNC Note</label><textarea id="form-cnc-note" placeholder="e.g. CNC Fan 1 left at wrong trailer"></textarea></div>
    <button class="btn btn-green" onclick="submitCheckInOut()">Submit</button>
  </div></div>
</div>
<div class="page" id="page-inventory">
  <div class="search-wrap"><span class="search-icon">&#128269;</span><input type="text" id="search-input" placeholder="Search equipment..." oninput="filterInv()"></div>
  <div class="filter-pills">
    <button class="pill active" onclick="setFilter('all',this)">All</button>
    <button class="pill" onclick="setFilter('IN',this)">In</button>
    <button class="pill" onclick="setFilter('OUT',this)">Out</button>
    <button class="pill" onclick="setFilter('CNC',this)">CNC</button>
  </div>
  <div class="card"><div class="card-body" id="inventory-list"><div class="loading"><div class="spinner"></div><br>Loading...</div></div></div>
</div>
<div class="page" id="page-admin">
  <div class="card"><div class="card-header">Add New Item</div><div class="card-body">
    <div class="form-group"><label>Item Name</label><input type="text" id="new-item-name" placeholder="e.g. Air Compressor #3"></div>
    <div class="form-group"><label>Default Location</label><input type="text" id="new-item-location" placeholder="e.g. Teaneck Garage"></div>
    <button class="btn btn-gold" onclick="addNewItem()">Add Item to Sheet</button>
  </div></div>
  <div class="card"><div class="card-header">Recent Activity</div><div class="card-body" id="admin-activity"><div class="loading"><div class="spinner"></div><br>Loading...</div></div></div>
  <div class="card"><div class="card-header">System Info</div><div class="card-body" style="font-size:13px;color:#555;line-height:1.8;">
    <div><strong>Version:</strong> GitHub PWA v1.0</div>
    <div><strong>Last Sync:</strong> <span id="last-sync">-</span></div>
    <br><button class="btn btn-green" onclick="refreshAll()">Force Refresh</button>
  </div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const AS='https://script.google.com/macros/s/AKfycbyXwNBWlifFTPzWdQycpC27fTUsn956KPn9MbrPDM9kXqrFYrqdYqvN_8a1WDmN92OMsQ/exec';
let items=[],curFilter='all',selType=null;
function switchTab(t,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  el.classList.add('active');
  if(t==='inventory')renderInv();
  if(t==='dashboard')renderDash();
  if(t==='admin')renderActivity();
  if(t==='checkinout')populateDrop();
}
async function load(){
  try{
    const r=await fetch(AS+'?action=getInventory&t='+Date.now());
    const d=await r.json();
    if(d&&d.items){items=d.items;document.getElementById('last-sync').textContent=new Date().toLocaleTimeString();return d.items;}
  }catch(e){console.error(e);}
  return null;
}
async function renderDash(){
  const data=items.length?items:await load();
  if(!data){
    document.getElementById('dash-out-list').innerHTML='<div style="color:#888;font-size:13px">Could not load. Check connection.</div>';
    document.getElementById('dash-cnc-list').innerHTML='';
    return;
  }
  document.getElementById('stat-total').textContent=data.length;
  const out=data.filter(i=>i.status==='OUT'),cnc=data.filter(i=>i.ccCnc==='CNC');
  document.getElementById('stat-out').textContent=out.length;
  document.getElementById('stat-in').textContent=data.filter(i=>i.status==='IN').length;
  document.getElementById('dash-out-list').innerHTML=out.length
    ?out.map(i=>'<div class="equip-item"><div class="equip-status-dot dot-out"></div><div style="flex:1"><div class="equip-name">'+i.name+'</div><div class="equip-location">'+(i.location||'-')+' - BC-'+(i.member||'?')+'</div></div><span class="badge badge-out">OUT</span></div>').join('')
    :'<div style="color:#27ae60;font-size:14px;text-align:center;padding:10px">All items checked in!</div>';
  document.getElementById('dash-cnc-list').innerHTML=cnc.length
    ?cnc.map(i=>'<div class="equip-item"><div class="equip-status-dot" style="background:#e74c3c"></div><div style="flex:1"><div class="equip-name">'+i.name+'</div><div class="equip-location">'+(i.location||'-')+'</div></div><span class="badge badge-cnc">CNC</span></div>').join('')
    :'<div style="color:#888;font-size:13px;text-align:center;padding:10px">No CNC items</div>';
}
function setFilter(f,el){curFilter=f;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');renderInv();}
async function renderInv(){
  const data=items.length?items:await load();
  if(!data){document.getElementById('inventory-list').innerHTML='<div style="color:#888">Could not load.</div>';return;}
  filterInv();
}
function filterInv(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  let f=items;
  if(curFilter==='IN')f=f.filter(i=>i.status==='IN');
  else if(curFilter==='OUT')f=f.filter(i=>i.status==='OUT');
  else if(curFilter==='CNC')f=f.filter(i=>i.ccCnc==='CNC');
  if(q)f=f.filter(i=>(i.name||'').toLowerCase().includes(q)||(i.location||'').toLowerCase().includes(q));
  document.getElementById('inventory-list').innerHTML=f.length
    ?f.map(i=>'<div class="equip-item"><div class="equip-status-dot '+(i.status==='IN'?'dot-in':'dot-out')+'"></div><div style="flex:1"><div class="equip-name">'+i.name+'</div><div class="equip-location">'+(i.location||'-')+(i.member?' - BC-'+i.member:'')+'</div></div><div style="text-align:right"><span class="badge '+(i.status==='IN'?'badge-in':'badge-out')+'">'+i.status+'</span>'+(i.ccCnc?'<br><span class="badge '+(i.ccCnc==='CNC'?'badge-cnc':'badge-cc')+'">'+i.ccCnc+'</span>':'')+'</div></div>').join('')
    :'<div style="color:#888;text-align:center;padding:20px">No items found</div>';
}
function selectType(t){
  selType=t;
  document.getElementById('btn-checkout').className='type-btn'+(t==='OUT'?' selected-out':'');
  document.getElementById('btn-checkin').className='type-btn'+(t==='IN'?' selected-in':'');
  document.getElementById('location-group').style.display=t==='OUT'?'block':'none';
  document.getElementById('cc-cnc-group').style.display=t==='IN'?'block':'none';
  document.getElementById('cnc-note-group').style.display='none';
  if(t==='IN')document.getElementById('form-cc-cnc').onchange=function(){document.getElementById('cnc-note-group').style.display=this.value==='CNC'?'block':'none';};
}
function populateDrop(){
  const s=document.getElementById('form-item');
  s.innerHTML='<option value="">- Select item -</option>';
  items.forEach(i=>{const o=document.createElement('option');o.value=i.row||i.name;o.textContent=i.name+(i.status?' ('+i.status+')':'');s.appendChild(o);});
}
async function submitCheckInOut(){
  if(!selType){toast('Select Check IN or OUT');return;}
  const item=document.getElementById('form-item').value,member=document.getElementById('form-member').value.trim();
  if(!item){toast('Select an item');return;}
  if(!member){toast('Enter member number');return;}
  const p={action:'checkInOut',status:selType,row:item,member,call:document.getElementById('form-call').value.trim(),location:document.getElementById('form-location').value.trim(),ccCnc:selType==='IN'?document.getElementById('form-cc-cnc').value:'',cncNote:selType==='IN'&&document.getElementById('form-cc-cnc').value==='CNC'?document.getElementById('form-cnc-note').value.trim():''};
  toast('Submitting...');
  try{
    const r=await fetch(AS,{method:'POST',body:JSON.stringify(p)});
    const d=await r.json();
    if(d.success){toast(selType==='OUT'?'Checked out!':'Checked in!');['form-item','form-member','form-call','form-location'].forEach(id=>document.getElementById(id).value='');items=[];setTimeout(refreshAll,500);}
    else toast('Error: '+(d.error||'Unknown'));
  }catch(e){toast('Could not connect.');}
}
async function renderActivity(){
  const data=items.length?items:await load();
  if(!data)return;
  const recent=[...data].filter(i=>i.lastUpdated).sort((a,b)=>new Date(b.lastUpdated)-new Date(a.lastUpdated)).slice(0,15);
  document.getElementById('admin-activity').innerHTML=recent.length
    ?recent.map(i=>'<div class="equip-item"><div class="equip-status-dot '+(i.status==='IN'?'dot-in':'dot-out')+'"></div><div style="flex:1"><div class="equip-name">'+i.name+'</div><div class="equip-location">'+(i.lastUpdated?new Date(i.lastUpdated).toLocaleString():'-')+'</div></div><span class="badge '+(i.status==='IN'?'badge-in':'badge-out')+'">'+i.status+'</span></div>').join('')
    :'<div style="color:#888;font-size:13px">No recent activity</div>';
}
async function addNewItem(){
  const name=document.getElementById('new-item-name').value.trim(),loc=document.getElementById('new-item-location').value.trim();
  if(!name){toast('Enter item name');return;}
  toast('Adding...');
  try{
    const r=await fetch(AS,{method:'POST',body:JSON.stringify({action:'addItem',name,location:loc})});
    const d=await r.json();
    if(d.success){toast('Item added!');document.getElementById('new-item-name').value='';document.getElementById('new-item-location').value='';items=[];refreshAll();}
    else toast('Error: '+(d.error||'Unknown'));
  }catch(e){toast('Could not connect.');}
}
function refreshAll(){
  items=[];
  load().then(()=>{
    renderDash();
    if(document.getElementById('page-inventory').classList.contains('active'))renderInv();
    if(document.getElementById('page-admin').classList.contains('active'))renderActivity();
    if(document.getElementById('page-checkinout').classList.contains('active'))populateDrop();
    toast('Refreshed');
  });
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
load().then(()=>{renderDash();populateDrop();});
</script>
</body>
</html>
